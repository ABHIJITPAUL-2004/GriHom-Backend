spring.application.name=backend

# ===============================
# DATABASE (FINAL FIX)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# ADMIN BOOTSTRAP
# ===============================
grihom.bootstrap-admin.email=admin@homevalue.com
grihom.bootstrap-admin.password=admin

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
grihom.jwt.secret=GriHomSuperSecretJwtKey2024VeryLongAndSecureKey!@#$%
grihom.jwt.expiration=86400000

# ===============================
# CORS
# ===============================
grihom.cors.allowed-origins=${CORS_ORIGIN:http://localhost:3000}

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}